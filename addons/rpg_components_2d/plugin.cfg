[plugin]

name="RPG_Components_2D"
description="RPG Components 2D is a collection of reusable components for building 2D RPGs in Godot. The library was designed with the principal of Overwriting via Polymorphism in mind. This means that extending the nodes with your own custom code is intended. This will allow greater customization and gives you the oppurtunity to fine-tune them (if needed)."
author="MUmarShahbaz"
version="1.1.0"
script="rpg_components_2d.gd"
